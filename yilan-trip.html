<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宜蘭三日遊 🌊 行程規劃</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #e8f4f8;
  --bg2:      #ddeef5;
  --ocean:    #3b82c4;
  --sky:      #5ba3d9;
  --aqua:     #38bcd4;
  --coral:    #ff7b7b;
  --peach:    #ffaa88;
  --lemon:    #ffe566;
  --mint:     #5ecfb0;
  --lavender: #b8a0e8;
  --rose:     #ff8fa0;
  --white:    #ffffff;
  --card:     #ffffffcc;
  --card2:    #f0faff;
  --text:     #1e3a4a;
  --text2:    #4a7a8a;
  --text3:    #8aaab8;
  --border:   rgba(59,130,196,0.15);
  --border2:  rgba(59,130,196,0.35);
  --shadow:   0 4px 24px rgba(59,130,196,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Animated ocean background ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, #b8e4f5 0%, #d4f0fa 30%, #e8f8fe 60%, #f0fafe 100%);
  z-index:-2;
}

/* floating bubbles decoration */
.bubble {
  position:fixed;
  border-radius:50%;
  opacity:0.18;
  animation:float linear infinite;
  z-index:-1;
  pointer-events:none;
}
@keyframes float {
  0%   { transform:translateY(100vh) scale(0.8); opacity:0; }
  10%  { opacity:0.18; }
  90%  { opacity:0.18; }
  100% { transform:translateY(-120px) scale(1); opacity:0; }
}

/* wave decoration at top */
.wave-top {
  position:fixed;
  top:0; left:0; right:0;
  height:6px;
  background:linear-gradient(90deg, var(--coral), var(--lemon), var(--aqua), var(--lavender), var(--coral));
  background-size:300% 100%;
  animation:waveSlide 4s linear infinite;
  z-index:200;
}
@keyframes waveSlide {
  0%  { background-position:0% 50%; }
  100%{ background-position:300% 50%; }
}

/* ── Header ── */
header {
  text-align:center;
  padding:64px 20px 32px;
  position:relative;
}

.header-deco {
  font-size:28px;
  margin-bottom:8px;
  letter-spacing:8px;
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

h1 {
  font-family:'Noto Serif TC',serif;
  font-size:clamp(28px,6vw,56px);
  color:var(--ocean);
  font-weight:700;
  line-height:1.2;
  text-shadow:0 2px 20px rgba(59,130,196,0.2);
}
h1 span { color:var(--coral); }

.header-sub {
  font-size:12px;
  color:var(--text2);
  margin-top:10px;
  letter-spacing:2px;
}

.header-tags {
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:16px;
  flex-wrap:wrap;
}
.header-tag {
  font-size:11px;
  padding:4px 14px;
  border-radius:20px;
  font-weight:500;
  background:var(--white);
  border:1.5px solid var(--border2);
  color:var(--ocean);
}

/* ── Route bar ── */
.route-bar {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:14px 22px;
  background:var(--white);
  border:1.5px solid var(--border2);
  border-radius:50px;
  max-width:560px;
  margin:0 auto 44px;
  flex-wrap:wrap;
  box-shadow:var(--shadow);
}
.route-point {
  display:flex; align-items:center; gap:7px;
  color:var(--text); font-size:12px; font-weight:500;
}
.route-dot {
  width:9px; height:9px;
  border-radius:50%;
  background:var(--coral);
  flex-shrink:0;
}
.route-dot.end { background:var(--aqua); }
.route-arrow { color:var(--text3); font-size:14px; }

/* ── Container ── */
.container {
  max-width:1060px;
  margin:0 auto;
  padding:0 18px 130px;
}

/* ── Day section ── */
.day-section {
  margin-bottom:44px;
  animation:fadeUp 0.45s ease both;
}
.day-section:nth-child(2){animation-delay:.08s}
.day-section:nth-child(3){animation-delay:.16s}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

.day-header {
  display:flex; align-items:center; gap:12px;
  margin-bottom:16px;
}
.day-badge {
  background:linear-gradient(135deg,var(--ocean),var(--aqua));
  color:var(--white);
  font-weight:700; font-size:11px;
  letter-spacing:2px;
  padding:5px 16px;
  border-radius:6px;
  white-space:nowrap;
  box-shadow:0 2px 10px rgba(59,130,196,0.3);
}
.day-badge.d1{background:linear-gradient(135deg,#5ba3d9,#38bcd4)}
.day-badge.d2{background:linear-gradient(135deg,#ff7b7b,#ffaa88)}
.day-badge.d3{background:linear-gradient(135deg,#5ecfb0,#38bcd4)}

.day-title {
  font-family:'Noto Serif TC',serif;
  font-size:18px; color:var(--ocean); font-weight:700;
}
.day-emoji { font-size:18px; }
.day-line {
  flex:1; height:1.5px;
  background:linear-gradient(90deg,rgba(59,130,196,0.3),transparent);
}
.drag-hint { font-size:10px; color:var(--text3); white-space:nowrap; }

/* ── Timeline ── */
.timeline {
  position:relative;
  padding-left:30px;
}
.timeline::before {
  content:'';
  position:absolute;
  left:7px; top:0; bottom:0;
  width:2px;
  background:linear-gradient(180deg,var(--aqua),rgba(56,188,212,0.1));
  border-radius:2px;
}

/* ── Drive time ── */
.drive-time {
  display:flex; align-items:center; gap:8px;
  margin:-2px 0 4px -20px;
  color:var(--text3);
  font-size:11px;
  letter-spacing:0.3px;
}
.drive-time-inner {
  background:var(--white);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:2px 10px;
  display:flex; align-items:center; gap:5px;
  font-size:11px;
}

/* ── Stop card ── */
.stop-card {
  position:relative;
  margin-bottom:6px;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:18px 18px 16px 22px;
  transition:all 0.22s ease;
  box-shadow:var(--shadow);
  cursor:grab;
  backdrop-filter:blur(4px);
}
.stop-card:active{cursor:grabbing}
.stop-card:hover {
  background:var(--white);
  border-color:var(--border2);
  transform:translateX(4px);
  box-shadow:0 8px 32px rgba(59,130,196,0.18);
}

/* timeline dot */
.stop-card::before {
  content:'';
  position:absolute;
  left:-24px; top:22px;
  width:11px; height:11px;
  border-radius:50%;
  background:var(--aqua);
  border:2.5px solid var(--bg);
  box-shadow:0 0 0 2px var(--aqua);
}
.stop-card.special::before { background:var(--coral); box-shadow:0 0 0 2px var(--coral); }
.stop-card.night::before   { background:var(--lavender); box-shadow:0 0 0 2px var(--lavender); }
.stop-card.meal::before    { background:var(--peach); box-shadow:0 0 0 2px var(--peach); }
.stop-card.waypoint::before{ background:var(--mint); box-shadow:0 0 0 2px var(--mint); }

/* meal card */
.stop-card.meal {
  background:linear-gradient(135deg,#fff7f0cc,#fff0eacc);
  border-color:rgba(255,170,136,0.35);
  border-style:dashed;
}
.stop-card.meal:hover {
  background:linear-gradient(135deg,#fff7f0,#fff0ea);
}

/* waypoint card (transit stop) */
.stop-card.waypoint {
  background:linear-gradient(135deg,#f0fff8cc,#e8fdf4cc);
  border-color:rgba(94,207,176,0.35);
}

.stop-top {
  display:flex; align-items:flex-start;
  justify-content:space-between;
  gap:10px; flex-wrap:wrap;
}
.stop-left { flex:1; min-width:180px; }

/* ── Time display & scroll control ── */
.time-row {
  display:flex; align-items:center; gap:8px;
  margin-bottom:5px;
}
.time-display {
  font-size:12px; font-weight:600;
  color:var(--ocean);
  letter-spacing:1.5px;
  background:rgba(59,130,196,0.08);
  border:1px solid rgba(59,130,196,0.2);
  border-radius:20px;
  padding:2px 10px;
  cursor:pointer;
  transition:all 0.2s;
  user-select:none;
  white-space:nowrap;
}
.time-display:hover{background:rgba(59,130,196,0.15);border-color:var(--ocean)}
.time-nudge {
  display:flex; align-items:center; gap:3px;
}
.time-btn {
  width:22px; height:22px;
  border-radius:50%;
  border:1.5px solid rgba(59,130,196,0.3);
  background:var(--white);
  color:var(--ocean);
  font-size:12px; font-weight:700;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
  flex-shrink:0;
  line-height:1;
}
.time-btn:hover{background:var(--ocean);color:var(--white);border-color:var(--ocean)}

/* time picker popup */
.time-picker {
  position:absolute;
  top:48px; left:22px;
  background:var(--white);
  border:1.5px solid var(--border2);
  border-radius:14px;
  padding:14px;
  box-shadow:0 8px 32px rgba(59,130,196,0.2);
  z-index:300;
  display:none;
  flex-direction:column; gap:10px;
  min-width:200px;
}
.time-picker.active{display:flex}
.time-picker-row {
  display:flex; align-items:center; gap:8px;
}
.time-picker label {
  font-size:11px; color:var(--text2);
  width:28px; text-align:right; flex-shrink:0;
}
.time-slider {
  flex:1;
  -webkit-appearance:none;
  height:4px;
  background:linear-gradient(90deg,var(--ocean),var(--aqua));
  border-radius:4px;
  outline:none;
}
.time-slider::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:16px; height:16px;
  border-radius:50%;
  background:var(--white);
  border:2px solid var(--ocean);
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.time-val {
  font-size:12px; font-weight:600;
  color:var(--ocean); width:28px; text-align:center;
}
.time-picker-actions {
  display:flex; gap:6px; justify-content:flex-end;
  margin-top:4px;
}
.tp-btn {
  font-size:11px; padding:4px 12px; border-radius:20px;
  border:none; cursor:pointer; font-family:'Noto Sans TC',sans-serif;
  font-weight:500;
}
.tp-ok  {background:var(--ocean);color:var(--white);}
.tp-ok:hover{background:#2a6aaa}
.tp-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);}

/* ── Card content ── */
.stop-name {
  font-family:'Noto Serif TC',serif;
  font-size:17px; color:var(--text);
  font-weight:700; margin-bottom:5px;
}
.meal-name-input, .meal-note-input, .waypoint-name-input {
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px; color:var(--text);
  background:transparent;
  border:none;
  border-bottom:1.5px dashed rgba(255,170,136,0.4);
  outline:none; width:100%;
  padding:0 0 2px;
  margin-bottom:5px;
}
.meal-name-input {font-weight:600; font-size:15px;}
.meal-name-input::placeholder,.meal-note-input::placeholder,.waypoint-name-input::placeholder{
  color:rgba(255,170,136,0.55); font-weight:400;
}
.meal-name-input:focus,.meal-note-input:focus{border-bottom-color:var(--peach)}
.waypoint-name-input{
  border-bottom-color:rgba(94,207,176,0.4); font-weight:600; font-size:15px;
}
.waypoint-name-input::placeholder{color:rgba(94,207,176,0.55)}
.waypoint-name-input:focus{border-bottom-color:var(--mint)}

.stop-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.stop-tag {
  font-size:10px; padding:2px 10px;
  border-radius:20px; font-weight:600; letter-spacing:0.3px;
}
.tag-culture  {background:#e8f0ff;color:#5570d0;border:1.5px solid #c0ccf0}
.tag-nature   {background:#e0faf2;color:#2aaa84;border:1.5px solid #a8e8d4}
.tag-food     {background:#fff0e8;color:#e07040;border:1.5px solid #f8c8a8}
.tag-transport{background:#e0f0ff;color:#3880c0;border:1.5px solid #a8cef0}
.tag-night    {background:#f0e8ff;color:#8050c0;border:1.5px solid #d0b8f0}
.tag-meal     {background:#fff4ee;color:#d06040;border:1.5px dashed #f0b8a0}
.tag-waypoint {background:#e8fff8;color:#28a878;border:1.5px solid #a0e8cc}

.stop-note {
  font-size:12px; color:var(--text2);
  margin-top:7px; line-height:1.65;
}

.stop-actions {
  display:flex; align-items:center; gap:7px; flex-shrink:0;
}
.btn-map {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; color:var(--ocean);
  text-decoration:none;
  border:1.5px solid rgba(59,130,196,0.25);
  border-radius:20px; padding:4px 11px;
  background:rgba(59,130,196,0.06);
  transition:all 0.18s; white-space:nowrap;
}
.btn-map:hover{background:var(--ocean);color:var(--white);border-color:var(--ocean)}
.btn-delete {
  width:26px; height:26px;
  border-radius:50%;
  border:1.5px solid rgba(220,80,80,0.25);
  background:transparent; color:rgba(220,80,80,0.5);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all 0.18s; flex-shrink:0;
}
.btn-delete:hover{background:rgba(220,80,80,0.1);border-color:rgba(220,80,80,0.5);color:#e05050}

/* ── Add buttons ── */
.add-row {
  display:flex; align-items:center; gap:8px;
  margin:10px 0 18px; flex-wrap:wrap;
}
.btn-add, .btn-add-meal, .btn-add-waypoint {
  display:flex; align-items:center; gap:6px;
  font-size:12px; font-family:'Noto Sans TC',sans-serif;
  padding:7px 16px; border-radius:40px; cursor:pointer;
  transition:all 0.2s; font-weight:500;
}
.btn-add {
  background:rgba(59,130,196,0.08);
  border:1.5px dashed rgba(59,130,196,0.3);
  color:var(--ocean);
}
.btn-add:hover{background:rgba(59,130,196,0.15);border-color:var(--ocean);color:var(--text)}
.btn-add-meal {
  background:rgba(255,170,136,0.1);
  border:1.5px dashed rgba(255,170,136,0.35);
  color:#d06040;
}
.btn-add-meal:hover{background:rgba(255,170,136,0.2);border-color:var(--peach);color:var(--text)}
.btn-add-waypoint {
  background:rgba(94,207,176,0.1);
  border:1.5px dashed rgba(94,207,176,0.35);
  color:#28a878;
}
.btn-add-waypoint:hover{background:rgba(94,207,176,0.2);border-color:var(--mint);color:var(--text)}

/* ── Section divider ── */
.section-divider {
  display:flex; align-items:center; gap:10px;
  margin:6px 0 10px -8px;
  font-size:11px; color:var(--text3);
}
.section-divider::after {
  content:''; flex:1;
  height:1px; background:rgba(59,130,196,0.12);
}

/* ── Modal ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(30,58,74,0.45);
  z-index:1000;
  align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(6px);
}
.modal-overlay.active{display:flex}
.modal {
  background:var(--white);
  border:1.5px solid var(--border2);
  border-radius:22px; padding:28px;
  width:100%; max-width:440px;
  box-shadow:0 24px 80px rgba(59,130,196,0.22);
  animation:modalIn 0.25s ease;
}
@keyframes modalIn {
  from{opacity:0;transform:scale(0.93) translateY(14px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.modal h3 {
  font-family:'Noto Serif TC',serif;
  font-size:18px; color:var(--ocean);
  margin-bottom:20px; padding-bottom:14px;
  border-bottom:1.5px solid var(--border);
}
.form-group{margin-bottom:14px}
.form-group label {
  display:block; font-size:11px;
  color:var(--text3); letter-spacing:1px;
  margin-bottom:6px; text-transform:uppercase; font-weight:600;
}
.form-group input,
.form-group select,
.form-group textarea {
  width:100%;
  background:var(--card2);
  border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px; padding:10px 13px;
  outline:none; transition:border-color 0.18s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{border-color:var(--ocean)}
.form-group select option{background:var(--white)}
.form-group textarea{resize:vertical;min-height:68px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-confirm {
  flex:1;
  background:linear-gradient(135deg,var(--ocean),var(--aqua));
  border:none; color:var(--white);
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px; font-weight:600;
  padding:11px; border-radius:10px; cursor:pointer;
  transition:all 0.18s;
}
.btn-confirm:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,196,0.3)}
.btn-cancel {
  flex:1; background:var(--card2);
  border:1.5px solid var(--border);
  color:var(--text2);
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px; padding:11px; border-radius:10px; cursor:pointer;
  transition:all 0.18s;
}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}

/* ── Summary bar ── */
.summary-bar {
  position:fixed; bottom:18px; left:50%;
  transform:translateX(-50%);
  background:var(--white);
  border:1.5px solid var(--border2);
  border-radius:50px;
  padding:11px 22px;
  display:flex; align-items:center; gap:18px;
  box-shadow:0 8px 32px rgba(59,130,196,0.2);
  z-index:100; flex-wrap:wrap; justify-content:center;
}
.summary-item{text-align:center}
.summary-num {
  font-size:22px; color:var(--ocean);
  font-weight:700; line-height:1;
}
.summary-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:1px}
.summary-div{width:1px;height:26px;background:var(--border2)}
.btn-print {
  background:linear-gradient(135deg,var(--coral),var(--peach));
  border:none; color:var(--white);
  font-family:'Noto Sans TC',sans-serif;
  font-size:12px; font-weight:700;
  padding:7px 16px; border-radius:30px; cursor:pointer;
  transition:all 0.18s; letter-spacing:0.5px;
  box-shadow:0 2px 10px rgba(255,123,123,0.25);
}
.btn-print:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(255,123,123,0.35)}

.empty-day{text-align:center;padding:18px;color:var(--text3);font-size:13px}

.stop-card.dragging{opacity:.3;transform:scale(.97)}
.stop-card.drag-over{border-color:var(--ocean);background:rgba(59,130,196,0.07)}

@media(max-width:600px){
  .timeline{padding-left:22px}
  .stop-card{padding:14px 14px 14px 16px}
  .summary-bar{bottom:10px;padding:9px 16px;gap:12px}
}
@media print{
  body{background:white}
  body::before,.wave-top,.bubble,.summary-bar,.btn-add,.btn-add-meal,.btn-add-waypoint,.btn-delete,.drag-hint,.time-nudge,.time-btn{display:none}
  .stop-card{background:#f8fbff;border:1px solid #c0d8f0;break-inside:avoid;box-shadow:none}
}
</style>
</head>
<body>

<div class="wave-top"></div>

<!-- Floating bubbles -->
<div class="bubble" style="width:40px;height:40px;left:5%;background:#38bcd4;animation-duration:12s;animation-delay:0s"></div>
<div class="bubble" style="width:24px;height:24px;left:18%;background:#ff7b7b;animation-duration:9s;animation-delay:2s"></div>
<div class="bubble" style="width:56px;height:56px;left:72%;background:#5ecfb0;animation-duration:15s;animation-delay:1s"></div>
<div class="bubble" style="width:18px;height:18px;left:88%;background:#ffe566;animation-duration:11s;animation-delay:4s"></div>

<script>
/* ─────────────────────────────
   Time utilities
───────────────────────────── */
function toMinutes(hhmm) {
  if (!hhmm) return 600; // default 10:00
  const [h,m] = hhmm.split(':').map(Number);
  return (isNaN(h)?10:h)*60 + (isNaN(m)?0:m);
}
function fromMinutes(total) {
  const t = ((total % 1440) + 1440) % 1440;
  const h = Math.floor(t/60), m = t%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function formatDrive(min) {
  if (!min) return '';
  if (min >= 60) {
    const h = Math.floor(min/60), m = min%60;
    return m ? `${h}小時${m}分` : `${h}小時`;
  }
  return `${min}分鐘`;
}

/* ─────────────────────────────
   Cascading time recalculation
   When one item's time changes, push subsequent items forward/back
   based on delta. Stops at items with type='stop' (anchors) unless
   cascadeAll=true.
───────────────────────────── */
function cascadeTime(dayIdx, fromIdx, deltaMin) {
  const day = itinerary[dayIdx];
  for (let i = fromIdx + 1; i < day.length; i++) {
    const item = day[i];
    if (item.time) {
      item.time = fromMinutes(toMinutes(item.time) + deltaMin);
    }
  }
}

/* ─────────────────────────────

/* ─────────────────────────────
   Active time picker state
───────────────────────────── */
let activePicker = null;

/* ─────────────────────────────
   Render
───────────────────────────── */
function renderItinerary() {
  const container = document.getElementById('itinerary');
  container.innerHTML = '';
  let total = 0;

  itinerary.forEach((day, di) => {
    total += day.filter(s => s.type === 'stop').length;
    const section = document.createElement('div');
    section.className = 'day-section';

    let cards = '';
    day.forEach((item, si) => {
      cards += renderItem(item, di, si);
      if (item.driveMin && si < day.length - 1) {
        cards += `<div class="drive-time"><div class="drive-time-inner">🚗 車程約 ${formatDrive(item.driveMin)}</div></div>`;
      }
    });

    section.innerHTML = `
      <div class="day-header">
        <div class="day-badge d${di+1}">DAY ${di+1}</div>
        <div class="day-title">${DAY_TITLES[di]}</div>
        <div class="day-line"></div>
        <div class="drag-hint">☰ 拖曳排序</div>
      </div>
      <div class="timeline" id="day-${di}">
        ${day.length === 0 ? '<div class="empty-day">尚無行程，點下方按鈕新增 ↓</div>' : cards}
      </div>
      <div class="add-row">
        <button class="btn-add" onclick="openModal(${di})">＋ 新增景點</button>
        <button class="btn-add-meal" onclick="addMeal(${di})">🍽 新增餐食</button>
        ${di === 2 ? `<button class="btn-add-waypoint" onclick="addWaypoint(${di})">📍 新增途中停留</button>` : ''}
      </div>
    `;
    container.appendChild(section);
  });

  document.getElementById('total-stops').textContent = total;
  setupDrag();
}

function renderItem(item, di, si) {
  if (item.type === 'meal')     return renderMeal(item, di, si);
  if (item.type === 'waypoint') return renderWaypoint(item, di, si);
  return renderStop(item, di, si);
}

function timeBlock(item, di, si) {
  const t = item.time || '10:00';
  return `
    <div class="time-row">
      <div class="time-display" onclick="togglePicker(event,${di},${si})">${t}</div>
      <div class="time-nudge">
        <button class="time-btn" onclick="nudgeTime(${di},${si},-15)" title="-15分">−</button>
        <button class="time-btn" onclick="nudgeTime(${di},${si},15)" title="+15分">＋</button>
      </div>
    </div>
    <div class="time-picker" id="tp-${di}-${si}">
      <div class="time-picker-row">
        <label>時</label>
        <input type="range" class="time-slider" min="0" max="23" step="1"
          value="${toMinutes(t) >= 0 ? Math.floor(toMinutes(t)/60) : 10}"
          oninput="updateSlider(${di},${si})" id="ts-h-${di}-${si}">
        <span class="time-val" id="tv-h-${di}-${si}">${String(Math.floor(toMinutes(t)/60)).padStart(2,'0')}</span>
      </div>
      <div class="time-picker-row">
        <label>分</label>
        <input type="range" class="time-slider" min="0" max="55" step="5"
          value="${Math.round((toMinutes(t) % 60)/5)*5}"
          oninput="updateSlider(${di},${si})" id="ts-m-${di}-${si}">
        <span class="time-val" id="tv-m-${di}-${si}">${String(Math.round((toMinutes(t) % 60)/5)*5).padStart(2,'0')}</span>
      </div>
      <div class="time-picker-actions">
        <button class="tp-btn tp-cancel" onclick="closePicker()">取消</button>
        <button class="tp-btn tp-ok" onclick="applyPicker(${di},${si})">確定</button>
      </div>
    </div>
  `;
}

function renderStop(stop, di, si) {
  const tag = TAG_MAP[stop.tag] || TAG_MAP.culture;
  const cardClass = stop.special ? 'stop-card special' : stop.tag === 'night' ? 'stop-card night' : 'stop-card';
  return `
    <div class="${cardClass}" draggable="true" data-day="${di}" data-idx="${si}">
      <div class="stop-top">
        <div class="stop-left">
          ${timeBlock(stop, di, si)}
          <div class="stop-name">${stop.name}</div>
          <div class="stop-meta"><span class="stop-tag ${tag.cls}">${tag.label}</span>
            ${stop.stayMin ? `<span style="font-size:11px;color:var(--text3)">⏱ 停留約${stop.stayMin}分鐘</span>` : ''}
          </div>
          ${stop.note ? `<div class="stop-note">${stop.note}</div>` : ''}
        </div>
        <div class="stop-actions">
          ${stop.map ? `<a class="btn-map" href="${stop.map}" target="_blank">📍 地圖</a>` : ''}
          <button class="btn-delete" onclick="deleteStop(${di},${si})">✕</button>
        </div>
      </div>
    </div>`;
}

function renderMeal(meal, di, si) {
  const icons = {午餐:'☀️ 午餐',晚餐:'🌙 晚餐',早餐:'🌅 早餐',早午餐:'🥐 早午餐'};
  const label = icons[meal.mealType] || '🍽 餐食';
  return `
    <div class="stop-card meal" draggable="true" data-day="${di}" data-idx="${si}">
      <div class="stop-top">
        <div class="stop-left">
          ${timeBlock(meal, di, si)}
          <span class="stop-tag tag-meal" style="margin-bottom:6px;display:inline-block">${label}</span>
          <input class="meal-name-input" value="${meal.name||''}"
            placeholder="填入餐廳名稱或地點…"
            onchange="updateField(${di},${si},'name',this.value)">
          <input class="meal-note-input" value="${meal.note||''}"
            placeholder="備註（推薦菜色、價位）…"
            onchange="updateField(${di},${si},'note',this.value)">
        </div>
        <div class="stop-actions">
          <button class="btn-delete" onclick="deleteStop(${di},${si})">✕</button>
        </div>
      </div>
    </div>`;
}

function renderWaypoint(wp, di, si) {
  return `
    <div class="stop-card waypoint" draggable="true" data-day="${di}" data-idx="${si}">
      <div class="stop-top">
        <div class="stop-left">
          ${timeBlock(wp, di, si)}
          <span class="stop-tag tag-waypoint" style="margin-bottom:6px;display:inline-block">📍 途中停留</span>
          <input class="waypoint-name-input" value="${wp.name||''}"
            placeholder="填入途中城市或景點名稱（如：新竹、苗栗）…"
            onchange="updateField(${di},${si},'name',this.value)">
          <input class="meal-note-input" value="${wp.note||''}"
            placeholder="備註（停留原因、推薦地點）…"
            onchange="updateField(${di},${si},'note',this.value)">
        </div>
        <div class="stop-actions">
          <button class="btn-delete" onclick="deleteStop(${di},${si})">✕</button>
        </div>
      </div>
    </div>`;
}

/* ─────────────────────────────
   Time picker
───────────────────────────── */
function togglePicker(e, di, si) {
  e.stopPropagation();
  closePicker();
  const id = `tp-${di}-${si}`;
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); activePicker = id; }
}
function closePicker() {
  if (activePicker) {
    const el = document.getElementById(activePicker);
    if (el) el.classList.remove('active');
    activePicker = null;
  }
}
function updateSlider(di, si) {
  const hEl = document.getElementById(`ts-h-${di}-${si}`);
  const mEl = document.getElementById(`ts-m-${di}-${si}`);
  if (hEl) document.getElementById(`tv-h-${di}-${si}`).textContent = String(hEl.value).padStart(2,'0');
  if (mEl) document.getElementById(`tv-m-${di}-${si}`).textContent = String(mEl.value).padStart(2,'0');
}
function applyPicker(di, si) {
  const h = parseInt(document.getElementById(`ts-h-${di}-${si}`).value);
  const m = parseInt(document.getElementById(`ts-m-${di}-${si}`).value);
  const newTime = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const oldMin = toMinutes(itinerary[di][si].time);
  const newMin = h*60 + m;
  const delta = newMin - oldMin;
  itinerary[di][si].time = newTime;
  cascadeTime(di, si, delta);
  closePicker();
  renderItinerary();
}
function nudgeTime(di, si, delta) {
  const oldMin = toMinutes(itinerary[di][si].time);
  itinerary[di][si].time = fromMinutes(oldMin + delta);
  cascadeTime(di, si, delta);
  renderItinerary();
}
document.addEventListener('click', () => closePicker());

/* ─────────────────────────────
   CRUD
───────────────────────────── */
function addMeal(di) {
  const types = ['早餐','午餐','晚餐','早午餐'];
  const existing = itinerary[di].filter(s=>s.type==='meal').map(s=>s.mealType);
  const next = types.find(t=>!existing.includes(t))||'餐食';
  const lastTime = itinerary[di].length ? toMinutes(itinerary[di][itinerary[di].length-1].time) + 30 : 720;
  itinerary[di].push({type:'meal', mealType:next, name:'', time:fromMinutes(lastTime), note:'', driveMin:null});
  renderItinerary();
}
function addWaypoint(di) {
  // Insert before last item (return journey)
  const insertIdx = Math.max(0, itinerary[di].length - 2);
  const prevTime = insertIdx > 0 ? toMinutes(itinerary[di][insertIdx-1].time)+30 : 660;
  itinerary[di].splice(insertIdx, 0, {
    type:'waypoint', name:'', time:fromMinutes(prevTime), note:'', driveMin:null
  });
  renderItinerary();
}
function openModal(day) {
  document.getElementById('input-day').value = day;
  ['input-name','input-time','input-note','input-map'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('input-stay').value='';
  document.getElementById('modal').classList.add('active');
  setTimeout(()=>document.getElementById('input-name').focus(),100);
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function addStop() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { document.getElementById('input-name').style.borderColor='#e05050'; return; }
  document.getElementById('input-name').style.borderColor='';
  const di = parseInt(document.getElementById('input-day').value);
  const timeRaw = document.getElementById('input-time').value || '10:00';
  const stayRaw = parseInt(document.getElementById('input-stay').value);
  itinerary[di].push({
    type:'stop', name,
    time: timeRaw,
    tag: document.getElementById('input-tag').value,
    note: document.getElementById('input-note').value.trim(),
    map:  document.getElementById('input-map').value.trim(),
    stayMin: isNaN(stayRaw) ? 0 : stayRaw,
    driveMin: null,
  });
  closeModal(); renderItinerary();
}
function deleteStop(di, si) {
  const item = itinerary[di][si];
  const label = item.type==='meal' ? item.mealType : (item.name || '此項目');
  if (!confirm(`確定要移除「${label}」嗎？`)) return;
  itinerary[di].splice(si, 1);
  renderItinerary();
}
function updateField(di, si, field, val) { itinerary[di][si][field] = val; }

/* ─────────────────────────────
   Drag & Drop
───────────────────────────── */
let dragSrc = null;
function setupDrag() {
  document.querySelectorAll('.stop-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrc = card; card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.stop-card').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrc !== card) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', ()=>card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc === card) return;
      const fDay=parseInt(dragSrc.dataset.day), fIdx=parseInt(dragSrc.dataset.idx);
      const tDay=parseInt(card.dataset.day),    tIdx=parseInt(card.dataset.idx);
      const [item]=itinerary[fDay].splice(fIdx,1);
      itinerary[tDay].splice(tIdx,0,item);
      renderItinerary();
    });
  });
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

renderItinerary();
</script>
